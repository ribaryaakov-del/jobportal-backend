name: Backend Docker Build, Push and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '21'

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build JAR file
        run: ./mvnw clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          IMAGE_NAME=rschoneveld/jobportal-backend
          IMAGE_TAG=${{ github.sha }}
          docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .

      - name: Push Docker image
        run: |
          IMAGE_NAME=rschoneveld/jobportal-backend
          IMAGE_TAG=${{ github.sha }}
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << EOF
            set -e

            sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"
            sudo docker pull rschoneveld/jobportal-backend:latest

            sudo docker stop jobportal-backend || true
            sudo docker rm jobportal-backend || true

            sudo docker run -d \
              --name jobportal-backend \
              --restart unless-stopped \
              -p 8080:8080 \
              -e DB_URL="${{ vars.DB_URL }}" \
              -e DB_USERNAME="${{ vars.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e GOOGLE_CLIENT_ID="${{ vars.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e APP_CORS_PROTOCOL="${{ vars.APP_CORS_PROTOCOL }}" \
              -e APP_CORS_HOST="${{ vars.APP_CORS_HOST }}" \
              -e APP_CORS_FRONTEND_PORT="${{ vars.APP_CORS_FRONTEND_PORT }}" \
              rschoneveld/jobportal-backend:latest

            sudo docker image prune -f
          EOF

name: Backend Docker Build, Push and Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build JAR file
        run: ./mvnw clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Check Docker values exist
        run: |
          echo "DOCKER_USERNAME set? ${{ vars.DOCKER_USERNAME != '' }}"
          echo "DOCKER_TOKEN set? ${{ secrets.DOCKER_TOKEN != '' }}"

      - name: Build Docker image
        run: |
          IMAGE_NAME=rschoneveld/jobportal-backend
          IMAGE_TAG=${{ github.sha }}
          docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .

      - name: Push Docker image
        run: |
          IMAGE_NAME=rschoneveld/jobportal-backend
          IMAGE_TAG=${{ github.sha }}
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

  deploy-backend:
    needs: build-backend
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          tr -d '\r' < ~/.ssh/ec2_key.pem > ~/.ssh/ec2_key_clean.pem
          mv ~/.ssh/ec2_key_clean.pem ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keygen -y -f ~/.ssh/ec2_key.pem > /dev/null
          ssh-keyscan -H "${{ vars.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Check SSH key file
        run: |
          ls -l ~/.ssh/ec2_key.pem
          head -n 2 ~/.ssh/ec2_key.pem

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem "${{ vars.EC2_USER }}@${{ vars.EC2_HOST }}" << EOF
            set -e

            sudo docker login -u "${{ vars.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_TOKEN }}"
            sudo docker pull rschoneveld/jobportal-backend:latest

            sudo docker stop jobportal-backend || true
            sudo docker rm jobportal-backend || true

            sudo docker run -d \
              --name jobportal-backend \
              --restart unless-stopped \
              -p 8080:8080 \
              -e DB_URL="${{ vars.DB_URL }}" \
              -e DB_USERNAME="${{ vars.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e GOOGLE_CLIENT_ID="${{ vars.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e APP_CORS_PROTOCOL="${{ vars.APP_CORS_PROTOCOL }}" \
              -e APP_CORS_HOST="${{ vars.APP_CORS_HOST }}" \
              -e APP_CORS_FRONTEND_PORT="${{ vars.APP_CORS_FRONTEND_PORT }}" \
              rschoneveld/jobportal-backend:latest

            sudo docker image prune -f
          EOF

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build frontend Docker image
        run: |
          IMAGE_NAME=rschoneveld/job-portal-ui
          IMAGE_TAG=${{ github.sha }}
          docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .

      - name: Push frontend Docker image
        run: |
          IMAGE_NAME=rschoneveld/job-portal-ui
          IMAGE_TAG=${{ github.sha }}
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

  deploy-frontend:
    needs: build-frontend
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          tr -d '\r' < ~/.ssh/ec2_key.pem > ~/.ssh/ec2_key_clean.pem
          mv ~/.ssh/ec2_key_clean.pem ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H "${{ vars.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy frontend on EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem "${{ vars.EC2_USER }}@${{ vars.EC2_HOST }}" << EOF
            set -e

            sudo docker login -u "${{ vars.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_TOKEN }}"
            sudo docker pull rschoneveld/job-portal-ui:latest

            sudo docker stop jobportal-frontend || true
            sudo docker rm jobportal-frontend || true

            sudo docker run -d \
              --name jobportal-frontend \
              --restart unless-stopped \
              -p 5173:5173 \
              rschoneveld/job-portal-ui:latest

            sudo docker image prune -f
          EOF